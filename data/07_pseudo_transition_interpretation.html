      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

\u0026quot;value\u0026#92;\u0026quot;:\u0026#92;\u0026quot;glc_2020_settlements\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;field\u0026#92;\u0026quot;:\u0026#92;\u0026quot;calibration choice\u0026#92;\u0026quot;,\u0026#92;\u0026quot;value\u0026#92;\u0026quot;:\u0026#92;\u0026quot;glc_2020_plus_clipped_chen_deltas\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;field\u0026#92;\u0026quot;:\u0026#92;\u0026quot;negative delta policy\u0026#92;\u0026quot;,\u0026#92;\u0026quot;value\u0026#92;\u0026quot;:\u0026#92;\u0026quot;clip_to_zero_and_record\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;field\u0026#92;\u0026quot;:\u0026#92;\u0026quot;interval semantics\u0026#92;\u0026quot;,\u0026#92;\u0026quot;value\u0026#92;\u0026quot;:\u0026#92;\u0026quot;decadal_start_year\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;field\u0026#92;\u0026quot;:\u0026#92;\u0026quot;scenario table sets\u0026#92;\u0026quot;,\u0026#92;\u0026quot;value\u0026#92;\u0026quot;:1035}]\u0026quot;' data-total-rows='10' data-total-columns='2' data-max-columns='50' data-banner-text='\u0026quot;\u0026quot;' data-pagination='false' data-page-size='10' data-field-types='[[\u0026quot;field\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;object\u0026quot;]],[\u0026quot;value\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;object\u0026quot;]]]' data-show-filters='true' data-show-download='true' data-show-search='true' data-show-column-summaries='false' data-show-data-types='true' data-show-page-size-selector='true' data-show-column-explorer='true' data-show-chart-builder='true' data-row-headers='[]' data-hidden-columns='[]' data-has-stable-row-id='false' data-lazy='false' data-preload='false'\u003E\u003C/marimo-table\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "2f070f5f945c0529285b12aff133d9ed", "console": [], "id": "EgVF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"why-pseudo-transitions-are-needed\"\u003EWhy Pseudo-Transitions Are Needed\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EChen SSP data provide projected urban or settlement extent by decade and\nscenario. They do not say which AFOLU class was converted when settlement area\nexpanded. The carbon model, however, needs transition tables with a concrete\n\u003Ccode\u003Estart\u003C/code\u003E class and \u003Ccode\u003Eend\u003C/code\u003E class.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe pseudo-transition step therefore answers a constrained allocation question:\u003C/span\u003E\n\u003Cblockquote\u003E\n\u003Cspan class=\"paragraph\"\u003EGiven Chen-derived settlement growth for a zone, SSP, and decade, how should\nthat new settlement area be assigned back to AFOLU source classes?\u003C/span\u003E\n\u003C/blockquote\u003E\n\u003Cspan class=\"paragraph\"\u003EThe total settlement demand is fixed by Chen. The three methods differ only in\nhow they assign source classes for that demand.\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003EMethod\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EPlain-English Rule\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EMain assumption\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EBest read as\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EMain limitation\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EHistorical shares\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EAllocate future settlement growth using the observed historical source-class shares for transitions into settlements\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EPast settlement expansion patterns are informative for future expansion\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EEmpirical default\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ECan preserve historical patterns even when future expansion shifts spatially or economically\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EAvailability-constrained\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EStart with historical source shares, then weight them by source area still available at the start of each interval\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EHistorical patterns matter, but classes with more available area are more plausible future sources\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EConservative feasibility variant\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EAvailability is not the same as urban suitability or adjacency\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EPriority ranking\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EAllocate demand sequentially through a fixed source priority order before touching lower-priority classes\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EThe chosen priority order is a defensible sensitivity assumption\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EBounding or stress-test case\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EStrongly assumption-driven and can concentrate allocation into a few classes\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e24871f96f78cc467498d6560540a266", "console": [], "id": "ATAw", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"method-mechanics\"\u003EMethod Mechanics\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe three methods share the same state update and differ only in how they\nconstruct the source-class allocation vector for each zone, SSP, and decade.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor a zone \u003Ccode\u003Ez\u003C/code\u003E, SSP \u003Ccode\u003Es\u003C/code\u003E, interval \u003Ccode\u003Et0 -\u0026gt; t1\u003C/code\u003E, and non-settlement AFOLU source\nclass \u003Ccode\u003Ei\u003C/code\u003E, notebook \u003Ccode\u003E06\u003C/code\u003E works with:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003ED[z, s, t0, t1]\u003C/code\u003E: Chen-derived settlement-growth demand for the interval.\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EA_i[t0]\u003C/code\u003E: source-class area available at the start of the interval.\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003Eh_i\u003C/code\u003E: historical prior share for source class \u003Ccode\u003Ei\u003C/code\u003E.\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003Ex_i\u003C/code\u003E: allocated area from source class \u003Ccode\u003Ei\u003C/code\u003E into \u003Ccode\u003Esettlements\u003C/code\u003E.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe demand is the positive Chen urban-area delta:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Eraw_delta = chen_urban_area[t1] - chen_urban_area[t0]\nD = max(raw_delta, 0)\nclipped_negative_delta = max(-raw_delta, 0)\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ENegative Chen deltas are recorded but not converted into\n\u003Ccode\u003Esettlements -\u0026gt; non-settlements\u003C/code\u003E transitions. This keeps the first diagnostic\nworkflow focused on urban expansion, which is the part Chen can directly\nconstrain.\u003C/span\u003E\n\u003Ch3 id=\"shared-transition-state-update\"\u003EShared Transition-State Update\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EFor every interval, the transition matrix starts as pure persistence:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EM[i, i] = A_i[t0] for every AFOLU class i\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EAfter an allocation vector \u003Ccode\u003Ex\u003C/code\u003E is chosen, the matrix is edited only for\nsettlement expansion:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EM[source, source]      -= x_source\nM[source, settlements] += x_source\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThe next interval starts from the updated area state:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EA_source[t1]      = A_source[t0] - x_source\nA_settlements[t1] = A_settlements[t0] + sum(x_source)\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ENo non-settlement-to-non-settlement transitions are invented. Classes that are\nnot used as settlement sources persist through the interval.\u003C/span\u003E\n\u003Ch3 id=\"shared-capped-proportional-allocator\"\u003EShared Capped Proportional Allocator\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EBoth \u003Ccode\u003Ehistorical_shares\u003C/code\u003E and \u003Ccode\u003Eavailability_constrained\u003C/code\u003E use the same iterative\ncapped proportional allocator:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Eremaining_demand = D\nremaining_available_i = max(A_i[t0], 0)\nweights_i = method-specific non-negative weights\n\nwhile remaining_demand \u0026gt; epsilon and some source remains available:\n    active_weights_i = weights_i for sources with remaining_available_i \u0026gt; 0\n    if sum(active_weights) == 0:\n        active_weights_i = remaining_available_i\n\n    proposed_i = remaining_demand * active_weights_i / sum(active_weights)\n    capped_i = min(proposed_i, remaining_available_i)\n\n    x_i += capped_i\n    remaining_available_i -= capped_i\n    remaining_demand -= sum(capped_i)\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThis is important because it prevents impossible source depletion. If one class\ncannot supply its proposed share, the leftover demand is redistributed across\nthe remaining eligible sources.\u003C/span\u003E\n\u003Ch3 id=\"historical-shares\"\u003EHistorical Shares\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EThis method estimates historical priors from observed transitions into\n\u003Ccode\u003Esettlements\u003C/code\u003E, excluding settlement persistence:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Eh_i = sum_y transition_area[y, start=i, end=settlements]\n      / sum_j sum_y transition_area[y, start=j, end=settlements]\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EIf a zone has enough usable history, the implementation uses that zone's\nsource mix. Otherwise it falls back to a pooled prior constructed from the\nbroader historical transition evidence.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe method-specific weights are simply:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Eweights_i = h_i\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThe allocator then caps by \u003Ccode\u003EA_i[t0]\u003C/code\u003E and redistributes any remainder. This\nmeans the method is historically grounded, but still cannot allocate more of a\nsource class than exists at the start of an interval.\u003C/span\u003E\n\u003Ch3 id=\"availability-constrained\"\u003EAvailability-Constrained\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EThis method uses the same historical prior, but modulates it by the current\narea state:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Eweights_i = h_i * A_i[t0]\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EIf the weighted prior collapses to zero, the implementation falls back to pure\navailability:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Eweights_i = A_i[t0]\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EBecause \u003Ccode\u003EA_i[t0]\u003C/code\u003E is updated after every decade, this method is dynamically\navailability-aware. A class that was historically common as a settlement source\nloses influence as it becomes scarce. Conversely, abundant classes can receive\nmore allocation than they would under historical shares alone.\u003C/span\u003E\n\u003Ch3 id=\"priority-ranking\"\u003EPriority Ranking\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EThis method does not use historical transition shares. It applies a strict\nordered depletion rule:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Eremaining_demand = D\n\nfor source in priority_order:\n    x_source = min(remaining_demand, A_source[t0])\n    remaining_demand -= x_source\n    stop if remaining_demand == 0\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThe priority order is:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ecroplands -\u0026gt; pastures -\u0026gt; grasslands -\u0026gt; shrublands -\u0026gt; other -\u0026gt;\nforests_secondary -\u0026gt; forests_primary -\u0026gt; forests_mangroves -\u0026gt; wetlands -\u0026gt; flooded\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThis makes \u003Ccode\u003Epriority_ranking\u003C/code\u003E qualitatively different from the other two\nmethods. It is not a weighted proportional allocation; it is an assumption\nstress test. The first sufficiently available classes can absorb most or all of\nthe Chen demand before lower-priority classes are touched.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e92473e1ba6f94747ce64a219d530900", "console": [], "id": "MQLn", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "c1345e70b9a7c21520409024011f209c", "console": [], "id": "uLIY", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='uLIY-0' random-id='52fb8f5a-52d3-cb1e-b3ec-3f3f5b2ab6f9'\u003E\u003Cmarimo-table data-initial-value='[]' data-label='null' data-data='\u0026quot;[{\u0026#92;\u0026quot;ssp\u0026#92;\u0026quot;:\u0026#92;\u0026quot;SSP1\u0026#92;\u0026quot;,\u0026#92;\u0026quot;zones\u0026#92;\u0026quot;:69,\u0026#92;\u0026quot;intervals\u0026#92;\u0026quot;:552,\u0026#92;\u0026quot;positive_intervals\u0026#92;\u0026quot;:259,\u0026#92;\u0026quot;zero_intervals\u0026#92;\u0026quot;:293,\u0026#92;\u0026quot;total_demand_ha\u0026#92;\u0026quot;:311870.1960784314,\u0026#92;\u0026quot;clipped_negative_delta_ha\u0026#92;\u0026quot;:0.0},{\u0026#92;\u0026quot;ssp\u0026#92;\u0026quot;:\u0026#92;\u0026quot;SSP2\u0026#92;\u0026quot;,\u0026#92;\u0026quot;zones\u0026#92;\u0026quot;:69,\u0026#92;\u0026quot;intervals\u0026#92;\u0026quot;:552,\u0026#92;\u0026quot;positive_intervals\u0026#92;\u0026quot;:499,\u0026#92;\u0026quot;zero_intervals\u0026#92;\u0026quot;:53,\u0026#92;\u0026quot;total_demand_ha\u0026#92;\u0026quot;:552630.5882352942,\u0026#92;\u0026quot;clipped_negative_delta_ha\u0026#92;\u0026quot;:0.0},{\u0026#92;\u0026quot;ssp\u0026#92;\u0026quot;:\u0026#92;\u0026quot;SSP3\u0026#92;\u0026quot;,\u0026#92;\u0026quot;zones\u0026#92;\u0026quot;:69,\u0026#92;\u0026quot;intervals\u0026#92;\u0026quot;:552,\u0026#92;\u0026quot;positive_intervals\u0026#92;\u0026quot;:549,\u0026#92;\u0026quot;zero_intervals\u \u003Cspan class=\"paragraph\"\u003EIn this run, \u003Ccode\u003Ehistorical_shares\u003C/code\u003E allocates most expansion to \u003Cstrong\u003Ecroplands\u003C/strong\u003E\n(54.8%) and \u003Cstrong\u003Eshrublands\u003C/strong\u003E\n(32.8%). The\n\u003Ccode\u003Eavailability_constrained\u003C/code\u003E method shifts further toward croplands\n(59.8%), because available 2020 source\narea changes the effective weights. The \u003Ccode\u003Epriority_ranking\u003C/code\u003E sensitivity case\nputs \u003Cstrong\u003E90.5%\u003C/strong\u003E of expansion into croplands\nbefore using lower-ranked classes.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe compatibility diagnostics carried forward from earlier notebooks mark\n\u003Ccode\u003E24\u003C/code\u003E zones for manual review. That is not an artifact\nfailure; it is a caution that the Chen 2020 urban baseline and GLC 2020\nsettlements baseline are not perfectly aligned in those zones.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "aee7f6873fbfdd924f4b90ae081cfbd6", "console": [], "id": "TlCs", "outputs": [{"data": {"application/vnd.marimo+mimebundle": "{\"image/png\": \"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABNYAAAKACAYAAABQcvVvAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjEwLjEsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvc2/+5QAAAAlwSFlzAAASdAAAEnQB3mYfeAABAABJREFUeJzs3Xdc1fX///8bU0FARMQFiiNx71yVC8xcube4LVPLkVmafSrrrWam5cqZe6SoOLJUNPdAzVGWewHugYCCrPP7wy+vn0dwwEFBvV8vFy9xnuf5er0er+Ph1Ln3HFYmk8mEiIiIiIiIiIiIpIp1RhcgIiIiIiIiIiLyIlKwJiIiIiIiIiIikgYK1kRERERERERERNJAwZqIiIiIiIiIiEgaKFgTERERERERERFJAwVrIiIiIiIiIiIiaaBgTUREREREREREJA0UrImIiIiIiIiIiKSBgjUREREREREREZE0ULAmIiIiIiIiIiKSBgrWRERERERERERE0kDBmoiIPBf+/v74+Pjg4+ODv79/RpeTqUycONF4bXx8fDK6nBdCaGio2Wu2YsUK47kVK1aYPRcaGpqBlaa/unXrGvf22WefZXQ5L4XM9Jq+7O9fERGRl41tRhcgIvIsbdiwgeXLl3P06FHCw8Oxs7Mje/bseHh4UKxYMUqXLk27du0yuswXUnh4OMuXL2fXrl0cP36c27dvY2VlRa5cuShfvjz169enZs2aZM2aNaNLTXd79+6lc+fOZm3Fixdn1apVyfrGxsZSu3Ztbty4YdZ+/PjxZ1rjo3z22WesX "}, "type": "data"}]}], "metadata": {"marimo_version": "0.23.11", "script_metadata_hash": null}, "version": "1"},
